# ===========================================
# Tmux Configuration
# ===========================================

# ------------------------------------
# Prefix & Reload
# ------------------------------------

# Change prefix from C-b to C-s (more ergonomic)
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# Reload config with prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ------------------------------------
# Terminal & Colors
# ------------------------------------

# Enable true color support (required for Catppuccin, Neovim)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable extended keys (Option+Arrow, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Enable clickable hyperlinks (URLs in output open in browser)
set -as terminal-features ',xterm-256color:hyperlinks'

# Allow terminal escape sequences to pass through tmux
set -g allow-passthrough on

# ------------------------------------
# General Settings
# ------------------------------------

# Start windows/panes at 1 (0 is far from prefix key)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed (no gaps)
set -g renumber-windows on

# Scrollback buffer (lines kept in history)
set -g history-limit 10000

# Enable mouse (scroll, click to select pane, resize)
set -g mouse on

# No delay after pressing Escape (critical for Vim/Neovim)
set -sg escape-time 0

# How long tmux messages stay on screen (ms)
set -g display-time 4000

# Status bar refresh interval (seconds)
set -g status-interval 5

# Pass focus events to programs inside tmux (Neovim autoread, etc.)
set -g focus-events on

# ------------------------------------
# Vi Mode & Copy
# ------------------------------------

# Use vi keys in copy mode
setw -g mode-keys vi

# v to start selection, y to copy to system clipboard
bind -T copy-mode-vi v send-keys -X begin-selection
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ------------------------------------
# Pane & Window Management
# ------------------------------------

# Split panes (| horizontal, - vertical) in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Resize panes with vim-style keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Cycle through panes with Tab
bind -r Tab select-pane -t :.+

# Clear pane screen and scrollback (like Cmd+K)
bind k send-keys -R \; clear-history \; display-message "Pane cleared!"

# ------------------------------------
# Status Bar
# ------------------------------------

set -g status-style 'bg=#333333 fg=#5eacd3'
set -g status-left-length 40
set -g status-left '#[fg=#5eacd3,bg=#333333] [#S] '
set -g status-right '#[fg=#5eacd3] %Y-%m-%d %H:%M '

# Current window highlighted
setw -g window-status-current-style 'fg=#ffffff,bg=#5eacd3,bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style 'fg=#888888'
setw -g window-status-format ' #I:#W '

# Pane borders
set -g pane-border-style 'fg=#555555'
set -g pane-active-border-style 'fg=#50fa7b,bold'
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-status top
set -g pane-border-format ' #{pane_index}: #{pane_current_command} '

# ------------------------------------
# Plugins (managed by TPM)
# ------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'

# Navigate between tmux panes and Neovim splits with Ctrl+h/j/k/l
set -g @plugin 'christoomey/vim-tmux-navigator'

# Save and restore tmux sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ------------------------------------
# Initialize TPM (must be last line)
# ------------------------------------

run '~/.tmux/plugins/tpm/tpm'
