# ===========================================
# AeroSpace — Tiling Window Manager for macOS
# ===========================================
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# ------------------------------------
# General
# ------------------------------------

# Start AeroSpace at login
start-at-login = false

# Flatten nested containers for simpler layouts
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows the focused window/monitor
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

# ------------------------------------
# Gaps
# ------------------------------------

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.right = 10
outer.top = 10
outer.bottom = 10

# ------------------------------------
# Main Mode Keybindings
# ------------------------------------

[mode.main.binding]

# Focus windows (vim-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows (vim-style + Shift)
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Switch workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'

# Layout controls
alt-ctrl-slash = 'layout tiles horizontal vertical'
alt-ctrl-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-f = 'layout floating tiling'

# Resize (quick)
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Enter resize mode for fine-grained control
alt-r = 'mode resize'

# ------------------------------------
# Resize Mode
# ------------------------------------

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

# ------------------------------------
# Workspace Auto-Assignment Rules
# ------------------------------------

# Workspace 1: Browser, Chat, IDE
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 1'

# Cursor IDE
[[on-window-detected]]
if.app-id = 'com.todesktop.230313mzl4w4u92'
run = 'move-node-to-workspace 1'

# Workspace 2: Terminal (fullscreen)
[[on-window-detected]]
if.app-id = 'dev.warp.Warp-Stable'
run = ['move-node-to-workspace 2', 'fullscreen']

# Workspace 3: Secondary apps
[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = 'move-node-to-workspace 3'
